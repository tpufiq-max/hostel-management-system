# ========================================
# DEV Profile — H2 In-Memory Database
# ========================================

# H2 datasource — MODE=MySQL fixes case sensitivity issues
spring.datasource.url=jdbc:h2:mem:hosteldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate — auto-detected dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# H2 Console — http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ========================================
# Demo Data Seeding
# ----------------------------------------
# Seeds mess menus, maintenance requests, visitors,
# notices, events and sample students/rooms on first run.
# Idempotent — skips tables that already have data.
# ========================================
app.seed.demo-data.enabled=true

# ========================================
# Bootstrap Admin (dev defaults)
# ========================================
app.bootstrap.admin.enabled=true
app.bootstrap.admin.name=Administrator
app.bootstrap.admin.username=admin
app.bootstrap.admin.email=admin@hostel.com
app.bootstrap.admin.password=admin123
app.bootstrap.admin.phone=9876543210

# Logging
logging.level.com.hostel=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.deprecation=ERROR
