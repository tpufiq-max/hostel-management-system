# ========================================
# Hostel Management System - Application Properties
# ========================================

# Server Configuration
server.port=8080
spring.application.name=hostel-management-system

# Active Profile
# prod  → MySQL (default — what you run locally with MySQL installed)
# dev   → H2 in-memory (no MySQL needed, useful for quick testing)
# Override with env var:  SPRING_PROFILES_ACTIVE=dev
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:hostelManagementSystemSecretKeyForJWTTokenGeneration2024VerySecure}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration=${APP_JWT_REFRESH_EXPIRATION:604800000}

# CORS Configuration
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================================
# Initial Admin Bootstrap
# ----------------------------------------
# Creates ONE admin on first startup (idempotent — skipped if user exists).
# NO demo data is ever seeded — rooms, students, fees etc. start empty.
# Change password immediately after first login.
# Disable once your real admin is set:  APP_BOOTSTRAP_ADMIN_ENABLED=false
# ========================================
app.bootstrap.admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:true}
app.bootstrap.admin.name=${APP_BOOTSTRAP_ADMIN_NAME:Administrator}
app.bootstrap.admin.username=${APP_BOOTSTRAP_ADMIN_USERNAME:admin}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:admin@hostel.com}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:admin123}
app.bootstrap.admin.phone=${APP_BOOTSTRAP_ADMIN_PHONE:9876543210}
