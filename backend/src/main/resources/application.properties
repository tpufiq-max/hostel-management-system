# ========================================
# Hostel Management System - Application Properties
# ========================================

# Server Configuration
server.port=8080
spring.application.name=hostel-management-system

# Active Profile (dev uses H2, prod uses MySQL)
spring.profiles.active=dev

# JWT Configuration
app.jwt.secret=hostelManagementSystemSecretKeyForJWTTokenGeneration2024VerySecure
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================================
# Initial Admin Bootstrap
# ----------------------------------------
# An initial admin is created ONLY on first startup (when no user with the
# given email exists). No demo students, rooms, or fees are ever seeded.
# Override these via environment variables in production.
# IMPORTANT: change the password immediately after first login.
# ========================================
app.bootstrap.admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:true}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:admin@hostel.local}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:ChangeMe@123}
app.bootstrap.admin.name=${APP_BOOTSTRAP_ADMIN_NAME:Administrator}
app.bootstrap.admin.username=${APP_BOOTSTRAP_ADMIN_USERNAME:admin}
app.bootstrap.admin.phone=${APP_BOOTSTRAP_ADMIN_PHONE:0000000000}
