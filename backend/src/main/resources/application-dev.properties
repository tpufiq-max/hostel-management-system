# ========================================
# Development Profile - H2 Database
# ========================================

# H2 Database (file-based so data persists across restarts).
# Use jdbc:h2:mem:hosteldb if you want a fresh in-memory DB each run.
spring.datasource.url=jdbc:h2:file:./data/hosteldb;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.hostel=DEBUG
logging.level.org.springframework.security=DEBUG
