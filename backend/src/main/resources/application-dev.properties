# ========================================
# DEV Profile — H2 In-Memory Database
# ========================================

# H2 datasource
# NON_KEYWORDS: prevents H2 from treating these as reserved SQL keywords
# when Hibernate generates DDL/DML column names.
# Full list covers all reserved words used across our entities.
spring.datasource.url=jdbc:h2:mem:hosteldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=YEAR,VALUE,DATE,STATUS,INTERVAL,MONTH,DAY,TIME,TIMESTAMP,MINUTE,SECOND,HOUR,WEEK,QUARTER,CURRENT,SCHEMA,CATALOG,KEY,VALUE,ROW,ROWS,CONSTRAINT,TYPE,UNIQUE,INDEX,DOMAIN,SEQUENCE,SESSION,SYSTEM,TRANSACTION,COMMIT,ROLLBACK
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# H2 Console — http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Logging
logging.level.com.hostel=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.deprecation=ERROR
