# ========================================
# Production Profile — MySQL Database
# ========================================

# MySQL Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hostel_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Disable H2 console in production
spring.h2.console.enabled=false

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ========================================
# Demo Data Seeding — OFF in production
# ----------------------------------------
# Set APP_SEED_DEMO_DATA=true only for a one-time demo environment.
# Never enable in real production.
# ========================================
app.seed.demo-data.enabled=${APP_SEED_DEMO_DATA:false}

# ========================================
# Bootstrap Admin (override via env vars)
# ----------------------------------------
# Set APP_BOOTSTRAP_ADMIN_ENABLED=false after your real admin is created.
# ALWAYS change the default password immediately after first login.
# ========================================
app.bootstrap.admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:true}
app.bootstrap.admin.name=${APP_BOOTSTRAP_ADMIN_NAME:Administrator}
app.bootstrap.admin.username=${APP_BOOTSTRAP_ADMIN_USERNAME:admin}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:admin@hostel.com}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:ChangeMe@123}
app.bootstrap.admin.phone=${APP_BOOTSTRAP_ADMIN_PHONE:0000000000}

# Logging
logging.level.com.hostel=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.deprecation=ERROR
