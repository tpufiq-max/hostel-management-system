# ========================================
# Hostel Management System - Application Properties
# ========================================

# Server Configuration
server.port=8080
spring.application.name=hostel-management-system

# Active Profile (dev uses H2, prod uses MySQL)
spring.profiles.active=prod

# JWT Configuration
app.jwt.secret=hostelManagementSystemSecretKeyForJWTTokenGeneration2024VerySecure
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB