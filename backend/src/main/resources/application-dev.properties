# ========================================
# DEV Profile — H2 In-Memory Database
# ========================================

# H2 datasource — MODE=MySQL fixes case sensitivity issue
spring.datasource.url=jdbc:h2:mem:hosteldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=VALUE

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=root123

# JPA / Hibernate — remove explicit dialect (auto-detected)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console — http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Suppress warnings
spring.jpa.open-in-view=false

# Logging
logging.level.com.hostel=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.deprecation=ERROR

# Demo Data Seeding
app.seed.demo-data.enabled=true
